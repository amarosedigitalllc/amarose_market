plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.amarose_market"
    compileSdkVersion flutter.compileSdkVersion
    defaultConfig {
        applicationId "com.example.amarose_market"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
}
